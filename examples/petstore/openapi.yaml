openapi: '3.0.3'
info:
  title: Petstore API
  version: '1.0.0'
  description: A sample Pet Store API for testing Ironic SDK generation.

servers:
  - url: https://api.petstore.io/v1
    description: Production

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns a paginated list of pets.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: after
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pet'
                  has_more:
                    type: boolean
                required:
                  - data
                  - has_more
    post:
      operationId: createPet
      summary: Create a pet
      description: Create a new pet in the store.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        '201':
          description: The created pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'

  /pets/{pet_id}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
    patch:
      operationId: updatePet
      summary: Update a pet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePetRequest'
      responses:
        '200':
          description: The updated pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Pet deleted

  /owners:
    get:
      operationId: listOwners
      summary: List all owners
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: A list of owners
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Owner'
                  total:
                    type: integer
                required:
                  - data
                  - total

  /owners/{owner_id}:
    get:
      operationId: getOwner
      summary: Get an owner
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: An owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'

components:
  schemas:
    Pet:
      type: object
      description: A pet in the store.
      properties:
        id:
          type: string
          description: Unique identifier
        name:
          type: string
          description: The pet's name
        species:
          type: string
          enum: [dog, cat, bird, fish]
          description: The species of the pet
        status:
          type: string
          enum: [available, pending, sold]
          description: Current adoption status
        age:
          type: integer
          description: Age in years
        owner_id:
          type: string
          description: Owner's ID (if adopted)
          nullable: true
        tags:
          type: array
          items:
            type: string
          description: Tags for categorization
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - species
        - status
        - created_at

    CreatePetRequest:
      type: object
      description: Request body for creating a pet.
      properties:
        name:
          type: string
        species:
          type: string
          enum: [dog, cat, bird, fish]
        age:
          type: integer
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - species

    UpdatePetRequest:
      type: object
      description: Request body for updating a pet.
      properties:
        name:
          type: string
        status:
          type: string
          enum: [available, pending, sold]
        age:
          type: integer
        tags:
          type: array
          items:
            type: string

    Owner:
      type: object
      description: A pet owner.
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        pets:
          type: array
          items:
            type: string
          description: List of pet IDs
      required:
        - id
        - name
        - email

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
