# Stainless-shaped config.
edition: 2026-02-23

organization:
  name: petstore

spec: ./openapi.yaml

targets:
  typescript:
    package_name: "@petstore/sdk"
    output_dir: ./generated/typescript
    mcp_server:
      package_name: "@petstore/mcp"
      output_dir: ./generated/mcp

environments:
  production: https://api.petstore.io/v1

client_settings:
  default_timeout: 30000
  default_retries:
    max_retries: 2
  opts:
    api_key:
      type: string
      auth:
        security_scheme: HTTPBearer
      read_env: PETSTORE_API_KEY

security:
  - HTTPBearer: []

security_schemes:
  HTTPBearer:
    type: http
    scheme: bearer

pagination:
  type: cursor
  request:
    cursor_param: after
    limit_param: limit
  response:
    items_key: data
    has_more_key: has_more
    cursor_source: last_item_id
    cursor_field: id
