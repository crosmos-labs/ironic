version: 1
spec: ./openapi.yaml
targets:
  typescript:
    package_name: "@petstore/sdk"
    output_dir: ./generated/typescript
    mcp_server:
      package_name: "@petstore/mcp"
      output_dir: ./generated/mcp
  python:
    package_name: petstore-sdk
    output_dir: ./generated/python
client_settings:
  base_url: https://api.petstore.io/v1
  timeout_ms: 30000
  max_retries: 2
auth:
  type: bearer
  env_var: PETSTORE_API_KEY
pagination:
  cursor:
    request:
      cursor_param: after
      limit_param: limit
    response:
      items_key: data
      has_more_key: has_more
      cursor_source: last_item_id
      cursor_field: id
